services:
  postgres:
    image: postgres:16-alpine
    container_name: finpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-finpilot}
      POSTGRES_USER: ${DB_USER:-finpilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finpilot}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - finpilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-finpilot} -d ${DB_NAME:-finpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finpilot_pg_data:
    name: finpilot_pg_data
