spring:
  application:
    name: finpilot

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:finpilot}
    username: ${DB_USER:finpilot}
    password: ${DB_PASSWORD:finpilot}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1s
        multiplier: 2

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

finpilot:
  ai:
    models:
      categorizer: gpt-4o-mini
      parser: gpt-4o-mini
      analyst: gpt-4o
      chat: gpt-4o
    cost-cap-usd: ${FINPILOT_AI_COST_CAP_USD:5.0}

logging:
  level:
    root: INFO
    org.springframework.ai: INFO
    io.finpilot: DEBUG
    org.hibernate.SQL: WARN
